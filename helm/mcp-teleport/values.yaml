# Default values for mcp-teleport.

replicaCount: 1

image:
  registry: gsoci.azurecr.io
  repository: giantswarm/mcp-teleport
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8080

mcpTeleport:
  # Transport type: stdio, sse, or streamable-http
  transport: streamable-http
  # Enable debug logging
  debug: false
  # Enable non-destructive mode (default: true)
  nonDestructive: true
  # Additional environment variables
  env: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

volumes: []
volumeMounts: []
